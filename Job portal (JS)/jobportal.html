<!DOCTYPE html>
<html>
<head>
<title>Job Portal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>

body {
    margin: 0;
    font-family: Arial;
    background-image: url('your-image.jpg');
    background-size: cover;    
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;            
    overflow: hidden;        
}


header{
    display:flex;
    justify-content: space-between;
    align-items: center;
    background:#678Af4;
    padding:15px;
    color:white;
}


.logo{
    font-size:24px;
    font-weight:bold;
}


.nav-links{
    list-style:none;
    display:flex;
    margin:0;
    padding:0;
}

.nav-links li{
    margin:0 10px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-size:16px;
}

.nav-links a:hover{
    text-decoration:underline;
}


.buttons button{
    padding:8px 15px;
    margin-left:10px;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.login{
    background:white;
    color:blue;
}

.signup{
    background:green;
    color:white;
}


.content{
    padding:40px;
    text-align:center;
}
.card-container {

    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {

    background: white;
    padding: 50px;
    width: 250px;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

.card img {
    width: 50px;
}

.card button {

    background: #0d6efd;
    color: white;
    border: none;
    padding: 8px;
    margin-top: 10px;
    cursor: pointer;
}
img{
    width: 1500px;
    height: 600px;
}

</style>

</head>

<body>

<header>

<div class="logo">JOB PORTAL</div>

<nav>
<ul class="nav-links">

<li><a href="jobportal.html">HOME</a></li>
<li><a href="companies.html">COMPANIES</a></li>
<li><a href="vacancy.html">JOB VACANCIES</a></li>
<li><a href="application.html">APPLICATION FORM</a></li>


</ul>
</nav>

<div class="buttons">

<button class="login" onclick="login()">Login</button>

<button class="signup" onclick="signup()">Sign Up</button>

</div>

</header>

<div class="content">

<h1>Welcome to Job Portal</h1>

<p>Find your dream job here</p>
<img src="jobportal/job logo.jpg" alt="Job Search" class="hero-image">
</div>

<script>

function login()
{
    window.location.href="login.html";
}

function signup()
{
    window.location.href="signup.html";
}
</script>
<img id="jpg">
</body>
</html>
