<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Application Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
body
 { font-family: 'Segoe UI',
  sans-serif; background: #eef2f3;
   display: flex; justify-content: center;
    padding: 20px; }
.form-container 
{ background: #fff; 
padding: 25px;
 border-radius: 8px;
  width: 400px;
   box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
h2 
{ text-align: center;
 color: #333;
  margin-bottom: 20px; }
.input-group 
{ margin-bottom: 15px; }
label
 { font-weight: bold;
  display: block;
   margin-bottom: 5px;
    font-size: 14px; }
input, textarea, select
 { width: 100%;
  padding: 10px;
   border: 1px solid #ccc;
    border-radius: 4px;
     box-sizing: border-box; }
.error 
{ color: #d9534f;
 font-size: 12px;
  font-weight: bold;
   margin-top: 5px;
    display: block; }
button 
{ width: 100%;
 padding: 12px; 
 background: #007bff; 
 color: white;
  border: none;
   border-radius: 4px;
    cursor: pointer;
     font-size: 16px;
      margin-top: 10px; }
button:hover
 { background: #0056b3; }

</style>
<body>

<div class="form-container">
    <h2>Application Form</h2>
    <form id="appForm">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="userName" placeholder="Enter Name">
         
        </div>

        <div class="input-group">
            <label>Address</label>
            <textarea id="address" rows="3" placeholder="Enter Full Address"></textarea>
           
        </div>

        <div class="input-group">
            <label>Email (Format: number@gmail.com)</label>
            <input type="text" id="userEmail" placeholder="e.g. 12345@gmail.com">
           
        </div>

        <div class="input-group">
            <label>Phone Number (Numbers Only)</label>
            <input type="text" id="phone" maxlength="10" placeholder="10 Digit Number">
         
        </div>

        <div class="input-group">
            <label>Degree</label>
            <select id="degree">
                <option value="">-- Select Degree --</option>
                <option value="BE">B.E / B.Tech</option>
                <option value="BSC">B.Sc</option>
                <option value="ARTS">B.A / B.Com</option>
                <option value="MASTERS">Masters</option>
            </select>
            <small class="error" id="degreeError"></small>
        </div>

        <button type="submit">Submit Details</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
